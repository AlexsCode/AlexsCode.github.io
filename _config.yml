# ============================================================
# Alex Tuddenham — CV & Portfolio Site
# ============================================================
title: Alex Tuddenham
email: alex@tuddenham.info
description: >-
  Alex Tuddenham — Solution Architect & IoT Engineering Specialist. 
  eSIM (SGP.32), cellular IoT, embedded systems, and GSMA standards. CV, portfolio, and technical blog.
baseurl: ""
url: "https://tuddenham.info"
github_username: AlexsCode

# Social / SEO
twitter:
  card: summary_large_image

# Theme (GitHub Pages supported)
theme: jekyll-theme-minimal

# Build settings
markdown: kramdown
highlighter: rouge

# Plugins (GitHub Pages supported)
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/

# Collections
collections:
  portfolio:
    output: true
    permalink: /portfolio/:name/

# Defaults
defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/og-image.png
  - scope:
      path: ""
      type: "portfolio"
    values:
      layout: "project"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"

# Navigation
nav:
  - title: Home
    url: /
  - title: CV
    url: /cv/
  - title: Portfolio
    url: /portfolio/
  - title: About
    url: /about/
  - title: Blog
    url: /posts/
